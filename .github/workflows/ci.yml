name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + test ────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --select E,W,F --ignore E501

      - name: Run unit tests
        env:
          DATABASE_URL:       "postgresql+asyncpg://postgres:test@localhost:5432/catalog_test"
          ANTHROPIC_API_KEY:  "sk-ant-test-key"
          APP_ENV:            "test"
        run: |
          pytest tests/ -v --tb=short

  # ── Frontend: type-check + build ────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: npm run build

  # ── Weekly email report cron ────────────────────────────────────────────────
  weekly-report:
    name: Weekly Governance Report
    runs-on: ubuntu-latest
    # Every Monday at 08:00 UTC
    # (Uncomment after setting RESEND_API_KEY + REPORT_RECIPIENT_EMAIL in repo secrets)
    # schedule:
    #   - cron: "0 8 * * 1"
    if: false    # Disabled until secrets are configured — set to true to enable

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Send weekly report
        env:
          RESEND_API_KEY:          ${{ secrets.RESEND_API_KEY }}
          REPORT_RECIPIENT_EMAIL:  ${{ secrets.REPORT_RECIPIENT_EMAIL }}
          REPORT_SENDER_EMAIL:     ${{ secrets.REPORT_SENDER_EMAIL }}
          CATALOG_HEALTH_API_URL:  ${{ secrets.CATALOG_HEALTH_API_URL }}
        run: python scripts/send_weekly_report.py
